<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Operon — Hero G · Fluidity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --t1: #f4f6fb;
    --t2: rgba(220, 230, 250, 0.74);
    --t3: rgba(180, 195, 225, 0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background:
      radial-gradient(ellipse 50% 35% at 50% 0%, rgba(80, 130, 230, 0.28) 0%, rgba(60, 90, 180, 0.1) 35%, transparent 65%),
      linear-gradient(180deg, #0a1228 0%, #060912 60%, #050810 100%);
    color: var(--t1);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ==== ambient ribbons (full viewport, behind everything) ==== */
  .canvas-ribbons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .canvas-ribbons svg { width: 100%; height: 100%; }

  /* ==== hero composition: max-width container that scales proportionally ====
     Inside this container everything is sized in cqw/cqh (container query units)
     so all elements scale together. Outside, the body bg fills the rest of the viewport.
  */
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    height: 100vh;
    min-height: 680px;
    overflow: hidden;
    background: transparent;
    isolation: isolate;
    display: flex;
    flex-direction: column;
    container-type: inline-size;
    container-name: hero;
  }

  .hero-group {
    flex: 1;
    position: relative;
    min-height: 0;
    z-index: 5;
  }

  /* starfield in top portion */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 14%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1px 1px at 24% 8%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1.5px 1.5px at 38% 20%, rgba(180,220,255,0.6), transparent),
      radial-gradient(1px 1px at 52% 6%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 68% 18%, rgba(180,220,255,0.55), transparent),
      radial-gradient(1px 1px at 82% 10%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1.5px 1.5px at 92% 24%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 18% 28%, rgba(180,220,255,0.45), transparent),
      radial-gradient(1.5px 1.5px at 60% 30%, rgba(255,255,255,0.4), transparent);
    mask-image: linear-gradient(180deg, #000 0%, #000 30%, transparent 55%);
    z-index: 1;
  }

  /* ==== nav ==== */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px clamp(20px, 3cqw, 44px);
    width: 100%;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.005em;
    color: var(--t1);
  }
  .brand-mark {
    width: 26px; height: 26px;
    display: grid; place-items: center;
  }
  .nav-mid {
    display: flex; gap: 30px;
    font-size: 13px;
    color: rgba(230, 235, 250, 0.85);
    font-weight: 500;
  }
  .nav-mid a {
    color: inherit; text-decoration: none;
    transition: color 0.2s;
  }
  .nav-mid a:hover { color: var(--t1); }
  .nav-cta {
    font-size: 13px;
    font-weight: 600;
    color: #0a0f1c;
    background: #fff;
    padding: 9px 22px;
    border-radius: 100px;
    cursor: pointer;
    border: none;
    transition: all 0.25s;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(255, 255, 255, 0.18);
  }
  .nav-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 26px rgba(255, 255, 255, 0.28);
  }
  @media (max-width: 820px) { .nav-mid { display: none; } }

  /* ==== hero content ==== */
  .hero {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    text-align: center;
    padding: 0 clamp(24px, 5cqw, 80px);
    width: 100%;
    max-width: 64cqw;
  }

  .social-proof {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: rgba(220, 230, 250, 0.7);
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s ease forwards;
  }
  .avatars {
    display: flex;
    border-radius: 100px;
    padding: 2px;
  }
  .avatars span {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #0a1228;
    margin-left: -7px;
  }
  .avatars span:first-child { margin-left: 0; }
  .avatars span:nth-child(1) { background: linear-gradient(135deg, #5ba4f5, #89c4ff); }
  .avatars span:nth-child(2) { background: linear-gradient(135deg, #c47bff, #8b6dff); }
  .avatars span:nth-child(3) { background: linear-gradient(135deg, #4ad8ff, #5ba4f5); }
  .social-proof strong {
    color: var(--t1);
    font-weight: 600;
  }

  h1 {
    font-size: clamp(34px, 5.2cqw, 84px);
    line-height: 1.04;
    letter-spacing: -0.025em;
    font-weight: 600;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.9s 0.2s ease forwards;
  }
  h1 .l1 { color: #f4f6fb; }
  h1 .l2 {
    background: linear-gradient(180deg, rgba(220, 225, 240, 0.85) 0%, rgba(170, 180, 215, 0.7) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subhead {
    font-size: clamp(14px, 1.1cqw, 17px);
    line-height: 1.55;
    color: rgba(210, 220, 245, 0.66);
    max-width: 56cqw;
    margin: 0 auto 28px;
    opacity: 0;
    animation: fadeUp 0.9s 0.35s ease forwards;
  }

  .ctas {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.9s 0.5s ease forwards;
  }
  .btn {
    font-size: clamp(13px, 0.9cqw, 15px);
    font-weight: 600;
    padding: clamp(11px, 0.8cqw, 14px) clamp(24px, 1.8cqw, 30px);
    border-radius: 100px;
    cursor: pointer;
    border: none;
    transition: all 0.25s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    letter-spacing: -0.005em;
  }
  .btn-primary {
    background: #fff;
    color: #0a0f1c;
    box-shadow: 0 8px 22px rgba(255, 255, 255, 0.18), 0 2px 6px rgba(255, 255, 255, 0.12);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 28px rgba(255, 255, 255, 0.28);
  }
  .btn-ghost {
    background: rgba(8, 14, 28, 0.85);
    color: var(--t1);
    border: 1px solid rgba(74, 216, 255, 0.5);
    box-shadow:
      inset 0 0 12px rgba(74, 216, 255, 0.2),
      0 0 0 3px rgba(74, 216, 255, 0.06),
      0 4px 14px rgba(74, 216, 255, 0.18);
  }
  .btn-ghost:hover {
    border-color: rgba(74, 216, 255, 0.85);
    box-shadow:
      inset 0 0 16px rgba(74, 216, 255, 0.32),
      0 0 0 4px rgba(74, 216, 255, 0.1),
      0 6px 20px rgba(74, 216, 255, 0.3);
  }

  /* ==== arch visual ==== */
  .arch-stage {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    overflow: hidden;
  }
  .arch-stage svg {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(96cqw, 180cqh);
    max-width: 1700px;
    height: auto;
    aspect-ratio: 1000 / 540;
    opacity: 0;
    animation: archIn 1.4s 0.7s ease forwards;
  }
  .arch-floor {
    position: absolute;
    inset: auto 0 0 0;
    height: 30%;
    background:
      radial-gradient(ellipse 60% 100% at 50% 100%, rgba(80, 140, 230, 0.35) 0%, rgba(60, 90, 200, 0.15) 30%, transparent 60%);
    filter: blur(20px);
  }
  .floor-dust {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 70%, rgba(180,220,255,0.55), transparent),
      radial-gradient(1.5px 1.5px at 24% 85%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 36% 78%, rgba(140,200,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 48% 92%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1px 1px at 58% 75%, rgba(196,123,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 70% 88%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 82% 72%, rgba(180,220,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 90% 84%, rgba(255,255,255,0.4), transparent);
  }

  /* ==== animations ==== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes archIn {
    from { opacity: 0; transform: translateX(-50%) translateY(30px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
</style>
</head>
<body>

<!-- ambient ribbons span the whole viewport, behind the centered card -->
<div class="canvas-ribbons">
  <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ribbonGradTop" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5cb8ff" stop-opacity="0.55"/>
        <stop offset="50%" stop-color="#8a9eff" stop-opacity="0.32"/>
        <stop offset="100%" stop-color="#b48cff" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="ribbonGradBot" x1="100%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#46d8ff" stop-opacity="0.5"/>
        <stop offset="50%" stop-color="#7da4ff" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#b48cff" stop-opacity="0"/>
      </linearGradient>
      <filter id="ribbonGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8"/>
      </filter>
      <filter id="ribbonGlowSoft" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="32"/>
      </filter>
    </defs>

    <path d="M 1900 -100 Q 2100 600 1700 1100"
          stroke="url(#ribbonGradTop)" stroke-width="80" fill="none"
          filter="url(#ribbonGlowSoft)" opacity="0.65"/>
    <path d="M 1900 -100 Q 2100 600 1700 1100"
          stroke="url(#ribbonGradTop)" stroke-width="14" fill="none"
          filter="url(#ribbonGlow)" opacity="0.45"/>
    <path d="M 1900 -100 Q 2100 600 1700 1100"
          stroke="#a8d8ff" stroke-width="1.5" fill="none"
          opacity="0.5"/>

    <path d="M -50 200 Q -150 700 100 1180"
          stroke="url(#ribbonGradBot)" stroke-width="80" fill="none"
          filter="url(#ribbonGlowSoft)" opacity="0.65"/>
    <path d="M -50 200 Q -150 700 100 1180"
          stroke="url(#ribbonGradBot)" stroke-width="14" fill="none"
          filter="url(#ribbonGlow)" opacity="0.4"/>
    <path d="M -50 200 Q -150 700 100 1180"
          stroke="#9be0ff" stroke-width="1.5" fill="none"
          opacity="0.5"/>
  </svg>
</div>

<div class="card">
  <div class="stars"></div>

  <nav>
    <div class="brand">
      <div class="brand-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4ad8ff"/>
              <stop offset="60%" stop-color="#5ba4f5"/>
              <stop offset="100%" stop-color="#c47bff"/>
            </linearGradient>
          </defs>
          <path d="M4 4 L20 4 L14 11 L8 11 Z" fill="url(#logoGrad)"/>
          <path d="M4 13 L16 13 L11 20 L6 20 Z" fill="url(#logoGrad)" opacity="0.8"/>
        </svg>
      </div>
      <span>Operon</span>
    </div>
    <div class="nav-mid">
      <a href="#network">Network</a>
      <a href="#agents">Agents</a>
      <a href="#nodes">Nodes</a>
    </div>
    <a class="nav-cta" href="#launch">Connect</a>
  </nav>

  <div class="hero-group">
  <div class="hero">
    <div class="social-proof">
      <div class="avatars">
        <span></span><span></span><span></span>
      </div>
      <span><strong>2,400+</strong> nodes online</span>
    </div>

    <h1>
      <span class="l1">The Coordination Layer</span><br/>
      <span class="l2">for Autonomous AI Agents</span>
    </h1>

    <p class="subhead">
      Operon is the open coordination, verification, and distribution
      layer that moves AI agents from pilot to production.
    </p>

    <div class="ctas">
      <a class="btn btn-ghost" href="#explore">Our Network</a>
      <a class="btn btn-primary" href="#launch">Connect</a>
    </div>
  </div>

  <div class="arch-stage">
    <div class="arch-floor"></div>
    <svg viewBox="0 20 1000 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="archMain" x1="0%" y1="50%" x2="100%" y2="50%">
          <stop offset="0%" stop-color="#4ad8ff"/>
          <stop offset="18%" stop-color="#3aa8ff"/>
          <stop offset="38%" stop-color="#5ba4f5"/>
          <stop offset="50%" stop-color="#c8e0ff"/>
          <stop offset="62%" stop-color="#7d8eff"/>
          <stop offset="82%" stop-color="#c47bff"/>
          <stop offset="100%" stop-color="#ff7eb6"/>
        </linearGradient>
        <linearGradient id="archSoft" x1="0%" y1="50%" x2="100%" y2="50%">
          <stop offset="0%" stop-color="#4ad8ff" stop-opacity="0.7"/>
          <stop offset="50%" stop-color="#a0c0ff" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#ff7eb6" stop-opacity="0.7"/>
        </linearGradient>
        <filter id="archGlowBig" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="22"/>
        </filter>
        <filter id="archGlowMid" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8"/>
        </filter>
        <filter id="archGlowSm" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
        <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4"/>
        </filter>
      </defs>

      <!-- huge glow halo (under everything) -->
      <path d="M 100 500 A 400 400 0 0 1 900 500"
            stroke="url(#archSoft)" stroke-width="120" fill="none"
            filter="url(#archGlowBig)" opacity="0.4"/>

      <!-- continuous arch: outer halo -->
      <path d="M 140 500 A 360 360 0 0 1 860 500"
            stroke="url(#archMain)" stroke-width="42" fill="none"
            filter="url(#archGlowMid)" opacity="0.7"/>

      <!-- continuous arch: main body -->
      <path d="M 150 500 A 350 350 0 0 1 850 500"
            stroke="url(#archMain)" stroke-width="20" fill="none"
            filter="url(#archGlowSm)" opacity="0.95"/>

      <!-- bright thin core -->
      <path d="M 160 500 A 340 340 0 0 1 840 500"
            stroke="url(#archMain)" stroke-width="5" fill="none"
            opacity="1"/>

      <!-- inner faint tracer rings -->
      <path d="M 178 500 A 322 322 0 0 1 822 500"
            stroke="rgba(180, 220, 255, 0.22)" stroke-width="1" fill="none"
            stroke-dasharray="2 6"/>
      <path d="M 196 500 A 304 304 0 0 1 804 500"
            stroke="rgba(196, 123, 255, 0.18)" stroke-width="1" fill="none"
            stroke-dasharray="2 8"/>

      <!-- markers (ticks + boundary LEDs + brackets) generated via JS -->
      <g id="archTicks"></g>
      <g id="archBoundaries"></g>
      <g id="archBrackets"></g>

      <!-- traveling pulses: short bright packets -->
      <path id="archPulse"
            d="M 160 500 A 340 340 0 0 1 840 500"
            stroke="#ffffff" stroke-width="2.4" fill="none"
            stroke-linecap="round"
            filter="url(#pulseGlow)"
            opacity="1"/>
      <path id="archPulse2"
            d="M 160 500 A 340 340 0 0 1 840 500"
            stroke="#bff0ff" stroke-width="1.6" fill="none"
            stroke-linecap="round"
            filter="url(#pulseGlow)"
            opacity="0.85"/>

      <!-- segment labels -->
      <g id="archLabels" font-family="JetBrains Mono, monospace"
         font-size="9" fill="rgba(220, 230, 250, 0.65)"
         letter-spacing="1.5" text-anchor="middle"></g>

      <!-- base reflection / floor glow -->
      <ellipse cx="500" cy="540" rx="420" ry="18"
               fill="url(#archSoft)" opacity="0.45" filter="url(#archGlowMid)"/>
      <ellipse cx="500" cy="540" rx="280" ry="5"
               fill="#ffffff" opacity="0.45" filter="url(#archGlowSm)"/>
    </svg>
    <div class="floor-dust"></div>
  </div>
  </div>
</div>

<script>
  (function() {
    const SVGNS = 'http://www.w3.org/2000/svg';
    const cx = 500, cy = 500, R = 340;

    // angles: 0° = right, 90° = top, 180° = left. Math convention.
    const polar = (r, deg) => {
      const a = deg * Math.PI / 180;
      return [cx + r * Math.cos(a), cy - r * Math.sin(a)];
    };
    // SVG arc path between two angles (going over the top, sweep=1)
    const arcPath = (r, startDeg, endDeg) => {
      const [x1, y1] = polar(r, startDeg);
      const [x2, y2] = polar(r, endDeg);
      // we always travel from start (higher deg) to end (lower deg) over the top
      return `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`;
    };
    // wedge band: closed shape between innerR and outerR, from startDeg to endDeg
    const bandPath = (innerR, outerR, startDeg, endDeg) => {
      const [ox1, oy1] = polar(outerR, startDeg);
      const [ox2, oy2] = polar(outerR, endDeg);
      const [ix1, iy1] = polar(innerR, startDeg);
      const [ix2, iy2] = polar(innerR, endDeg);
      return `M ${ox1} ${oy1}
              A ${outerR} ${outerR} 0 0 1 ${ox2} ${oy2}
              L ${ix2} ${iy2}
              A ${innerR} ${innerR} 0 0 0 ${ix1} ${iy1}
              Z`;
    };

    // 5 pipeline stages, left → right (so angle decreases)
    const totalSpan = 168;     // total arc span in degrees (slightly less than 180 to leave bracket room)
    const startAngle = 174;    // left foot
    const gap = 2.5;           // degree gap between segments
    const stages = [
      { label: 'INGEST',     color: '#4ad8ff' },
      { label: 'COORDINATE', color: '#5ba4f5' },
      { label: 'VERIFY',     color: '#c8e0ff' },
      { label: 'DISTRIBUTE', color: '#a880ff' },
      { label: 'DEPLOY',     color: '#ff7eb6' },
    ];
    const segSpan = (totalSpan - gap * (stages.length - 1)) / stages.length;

    // compute segment angles
    const segments = stages.map((s, i) => {
      const sStart = startAngle - i * (segSpan + gap);
      const sEnd = sStart - segSpan;
      return { ...s, start: sStart, end: sEnd, mid: (sStart + sEnd) / 2 };
    });

    const tickG = document.getElementById('archTicks');
    const boundG = document.getElementById('archBoundaries');
    const labelG = document.getElementById('archLabels');
    const bracketG = document.getElementById('archBrackets');

    // ---- ticks: uniform radial marks on outer edge across whole arc ----
    const tickStart = startAngle;
    const tickEnd = startAngle - totalSpan;
    const tickStep = 3; // degree step between ticks
    let tickIdx = 0;
    for (let ang = tickStart; ang >= tickEnd; ang -= tickStep) {
      const major = tickIdx % 4 === 0;
      const [x1, y1] = polar(R + 12, ang);
      const [x2, y2] = polar(R + (major ? 24 : 18), ang);
      const tick = document.createElementNS(SVGNS, 'line');
      tick.setAttribute('x1', x1); tick.setAttribute('y1', y1);
      tick.setAttribute('x2', x2); tick.setAttribute('y2', y2);
      tick.setAttribute('stroke', '#ffffff');
      tick.setAttribute('stroke-width', major ? '1.2' : '0.7');
      tick.setAttribute('opacity', major ? 0.55 : 0.28);
      tick.setAttribute('stroke-linecap', 'round');
      tickG.appendChild(tick);
      tickIdx++;
    }

    // ---- segment boundary nodes: LED + cross-tick + radial outer mark ----
    segments.forEach((seg, i) => {
      if (i >= segments.length - 1) return;
      const ang = seg.end - 1.25; // mid-gap

      // outer radial spike (bright)
      const [sp1x, sp1y] = polar(R + 8, ang);
      const [sp2x, sp2y] = polar(R + 30, ang);
      const spike = document.createElementNS(SVGNS, 'line');
      spike.setAttribute('x1', sp1x); spike.setAttribute('y1', sp1y);
      spike.setAttribute('x2', sp2x); spike.setAttribute('y2', sp2y);
      spike.setAttribute('stroke', '#ffffff');
      spike.setAttribute('stroke-width', '1.6');
      spike.setAttribute('opacity', '0.85');
      spike.setAttribute('stroke-linecap', 'round');
      spike.setAttribute('filter', 'url(#archGlowSm)');
      boundG.appendChild(spike);

      // LED dot on the arch
      const [lx, ly] = polar(R, ang);
      const ledHalo = document.createElementNS(SVGNS, 'circle');
      ledHalo.setAttribute('cx', lx); ledHalo.setAttribute('cy', ly);
      ledHalo.setAttribute('r', '6');
      ledHalo.setAttribute('fill', '#ffffff');
      ledHalo.setAttribute('opacity', '0.35');
      ledHalo.setAttribute('filter', 'url(#archGlowSm)');
      boundG.appendChild(ledHalo);

      const led = document.createElementNS(SVGNS, 'circle');
      led.setAttribute('cx', lx); led.setAttribute('cy', ly);
      led.setAttribute('r', '2.2');
      led.setAttribute('fill', '#ffffff');
      led.setAttribute('opacity', '1');
      boundG.appendChild(led);
    });

    // ---- bracket feet at the ends of the arch ----
    [{ ang: startAngle + 4, side: 'L' },
     { ang: startAngle - totalSpan - 4, side: 'R' }].forEach(({ ang, side }) => {
      // small radial cap with a notch
      const [x1, y1] = polar(R - 24, ang);
      const [x2, y2] = polar(R + 24, ang);
      const cap = document.createElementNS(SVGNS, 'line');
      cap.setAttribute('x1', x1); cap.setAttribute('y1', y1);
      cap.setAttribute('x2', x2); cap.setAttribute('y2', y2);
      cap.setAttribute('stroke', side === 'L' ? '#4ad8ff' : '#ff7eb6');
      cap.setAttribute('stroke-width', '3');
      cap.setAttribute('stroke-linecap', 'round');
      cap.setAttribute('opacity', '0.95');
      cap.setAttribute('filter', 'url(#archGlowSm)');
      bracketG.appendChild(cap);

      // small inner LED at the foot
      const [fx, fy] = polar(R, ang);
      const ledFoot = document.createElementNS(SVGNS, 'circle');
      ledFoot.setAttribute('cx', fx); ledFoot.setAttribute('cy', fy);
      ledFoot.setAttribute('r', '3.2');
      ledFoot.setAttribute('fill', '#ffffff');
      ledFoot.setAttribute('opacity', '1');
      ledFoot.setAttribute('filter', 'url(#archGlowSm)');
      bracketG.appendChild(ledFoot);

      // tiny labels at feet
      const [lx, ly] = polar(R - 38, ang);
      const txt = document.createElementNS(SVGNS, 'text');
      txt.setAttribute('x', lx);
      txt.setAttribute('y', ly + 3);
      txt.setAttribute('font-family', 'JetBrains Mono, monospace');
      txt.setAttribute('font-size', '8');
      txt.setAttribute('letter-spacing', '1.5');
      txt.setAttribute('fill', side === 'L' ? '#7cdcff' : '#ffadd1');
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('opacity', '0.85');
      txt.textContent = side === 'L' ? 'IN' : 'OUT';
      bracketG.appendChild(txt);
    });

    // ---- segment labels (below the arc, horizontal) ----
    segments.forEach(seg => {
      const [lx, ly] = polar(R - 50, seg.mid);
      const txt = document.createElementNS(SVGNS, 'text');
      txt.setAttribute('x', lx);
      txt.setAttribute('y', ly + 2);
      txt.setAttribute('opacity', '0.7');
      txt.textContent = seg.label;
      labelG.appendChild(txt);
    });

    // ---- traveling pulses on the full arch ----
    const pulse1 = document.getElementById('archPulse');
    const pulse2 = document.getElementById('archPulse2');
    const len = pulse1.getTotalLength();
    const pktLen = 10;
    pulse1.style.strokeDasharray = `${pktLen} ${len}`;
    pulse2.style.strokeDasharray = `${pktLen * 0.7} ${len}`;
    let t0 = null;
    const dur = 3000;
    const offset = dur * 0.45; // second pulse offset so two packets are visible
    function tick(t) {
      if (!t0) t0 = t;
      const p1 = ((t - t0) % dur) / dur;
      const p2 = (((t - t0) + offset) % dur) / dur;
      pulse1.style.strokeDashoffset = `${len + pktLen - p1 * (len + pktLen * 2)}`;
      pulse2.style.strokeDashoffset = `${len + pktLen - p2 * (len + pktLen * 2)}`;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
</script>

</body>
</html>
